version: '3.8'

services:
  # 1. BASE DE DATOS: MySQL Centralizado
  gym-mysql:
    image: mysql:8.0
    container_name: gym-mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "3306:3306"
    volumes:
      - gym-db-data:/var/lib/mysql
    networks:
      - gym-network

  # 2. SERVIDOR DE DESCUBRIMIENTO: Eureka Server
  gym-eureka:
    image: gym-eureka:1.0
    container_name: gym-eureka-container
    ports:
      - "8761:8761"
    networks:
      - gym-network
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false

  # 3. ENRUTADOR: API Gateway
  gym-gateway:
    image: gym-gateway:1.0
    container_name: gym-gateway-container
    ports:
      - "8080:8080"
    networks:
      - gym-network
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://gym-eureka:8761/eureka/
    depends_on:
      - gym-eureka

  # 4. MICROSERVICIO: Clases
  gym-clases:
    image: gym-clases:1.0
    container_name: gym-clases-container
    networks:
      - gym-network
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://gym-eureka:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://gym-mysql:3306/db_gym_clases?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - gym-mysql
      - gym-eureka

  # 5. MICROSERVICIO: Socios
  gym-socios:
    image: gym-socios:1.0
    container_name: gym-socios-container
    networks:
      - gym-network
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://gym-eureka:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://gym-mysql:3306/db_gym_socios?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - gym-mysql
      - gym-eureka

  # 6. MICROSERVICIO: Contratos
  gym-contratos:
    image: gym-contratos:1.0
    container_name: gym-contratos-container
    networks:
      - gym-network
