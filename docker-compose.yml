      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://gym-eureka:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://gym-mysql:3306/db_gym_contratos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - gym-mysql
      - gym-eureka

  # 7. MICROSERVICIO: Entrenadores
  gym-entrenadores:
