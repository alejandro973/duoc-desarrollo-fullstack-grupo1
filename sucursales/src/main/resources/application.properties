spring.application.name=sucursales

# Puerto del servidor (Diferente a los demás)
server.port=8088

# Configuración de la Base de Datos Única (Compartida)
spring.datasource.url=jdbc:mysql://localhost:3306/db_gym?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Habilitación técnica de OpenAPI y Swagger UI para Sucursales
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
